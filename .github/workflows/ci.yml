name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify signed attribution
        run: python scripts/test_footer_integrity.py
      - name: Compile Python sources
        run: python -m compileall -q .
